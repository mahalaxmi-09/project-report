<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brandsparkx PMO - Security Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Login Stylesheet -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-page-wrapper">
        <!-- Animated Rotating Circle Container -->
        <div class="login-container">
            <div class="circle-container" id="circleContainer"></div>

            <div class="login-box">
                <div class="brand-logo-header">
                    <!-- Brandsparkx Monogram Logo -->
                    <svg width="40" height="40" viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M 62 6 L 64.5 16 L 74.5 18.5 L 64.5 21 L 62 31 L 59.5 21 L 49.5 18.5 L 59.5 16 L 62 6 Z" fill="#8D99AE" />
                        <rect x="74" y="6" width="3" height="3" fill="#8D99AE" />
                        <rect x="80" y="12" width="3" height="3" fill="#FFFFFF" />
                        <rect x="74" y="18" width="3" height="3" fill="#FFFFFF" />
                        <path d="M 20 20 H 46 C 54 20 58 24 58 31 C 58 36 54 39 46 40 C 55 41 60 45 60 53 C 60 61 54 64 44 64 H 20 Z M 30 26 V 36 H 44 C 47 36 49 35 49 32 C 49 29 47 26 44 26 Z M 30 44 V 58 H 45 C 48 58 50 56 50 53 C 50 50 48 44 45 44 Z" fill="#FFFFFF" />
                        <path d="M46,40 L72,64 L64,64 L40,40 L46,40 Z" fill="#FFFFFF"/>
                        <path d="M72,20 L44,64 L52,64 L78,20 H72 Z" fill="#8D99AE"/>
                    </svg>
                    <h2>BRANDSPARKX</h2>
                </div>
                <p class="login-tagline">Project Management Office Control Hub</p>

                <!-- Feedback banner for custom validations -->
                <div class="form-feedback" id="formFeedback" role="alert" style="display: none;"></div>

                <!-- LOGIN FORM -->
                <form id="loginForm" novalidate>
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Corporate Email" autocomplete="email" required>
                        <span class="input-icon">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <span class="validation-message" id="email-validation"></span>
                    </div>

                    <div class="input-group">
                        <input type="password" id="password" placeholder="Access Password" autocomplete="current-password" required>
                        <span class="input-icon password-toggle" id="togglePassword" title="Show/Hide password">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </span>
                        <span class="validation-message" id="password-validation"></span>
                    </div>

                    <div class="forgot-password">
                        <a href="#" id="forgot-password-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn" id="login-submit-btn">SIGN IN</button>
                </form>

                <div class="login-footer">
                    <p>Secured PMO Session. Authorized access only.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Logic Script -->
    <script type="module" src="login.js"></script>
</body>
</html>
